name: Update Profile

on:
  push:
    branches:
      - main
    paths-ignore:
      - "data/repo_stats.json"
      - "assets/**"

  schedule:
    - cron: "0 8 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-profile:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Wait for GitHub contribution indexing
        run: sleep 60

      - name: Generate profile assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/analyze_repos.py

      - name: Commit updated analytics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/repo_stats.json assets/
          git diff --cached --quiet || git commit -m "Update profile analytics"
          git push